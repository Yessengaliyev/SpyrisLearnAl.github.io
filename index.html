<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpyrisLearn — AI помощник для учёбы</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css"/>
  <style>
    :root {
      --purple: #a855f7;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
    }
    .display-font {
      font-family: 'Space Grotesk', sans-serif;
    }
    .glass {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
    }
    .message-bubble {
      max-width: 85%;
      padding: 14px 18px;
      border-radius: 18px;
    }
    .card {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .card.flipped {
      transform: rotateY(180deg);
    }
  </style>
</head>
<body class="bg-[#050505] text-white min-h-screen">

<div class="flex h-screen overflow-hidden">

  <!-- SIDEBAR -->
  <div class="w-72 bg-zinc-950 border-r border-white/10 flex flex-col">
    <div class="p-6 border-b border-white/10">
      <h1 class="text-4xl font-bold display-font tracking-tighter bg-gradient-to-r from-purple-400 to-violet-500 bg-clip-text text-transparent">
        SpyrisLearn
      </h1>
      <p class="text-xs text-zinc-500 mt-1">AI Study Assistant</p>
    </div>

    <div class="p-4 flex-1 overflow-y-auto">
      <p class="uppercase text-xs font-bold tracking-widest text-zinc-500 mb-3 px-3">Отделы</p>
      
      <div onclick="switchDepartment(this)" class="dept-btn active flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-white/5 cursor-pointer">
        <span class="text-purple-400">💬</span>
        <span class="font-medium">Общий чат</span>
      </div>
      <div onclick="switchDepartment(this)" class="dept-btn flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-white/5 cursor-pointer">
        <span class="text-amber-400">📊</span>
        <span class="font-medium">Анализ оценок</span>
      </div>
      <div onclick="switchDepartment(this)" class="dept-btn flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-white/5 cursor-pointer">
        <span class="text-blue-400">📇</span>
        <span class="font-medium">Флеш-карточки</span>
      </div>
      <div onclick="switchDepartment(this)" class="dept-btn flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-white/5 cursor-pointer">
        <span class="text-pink-400">❓</span>
        <span class="font-medium">Тесты и квизы</span>
      </div>
      <div onclick="switchDepartment(this)" class="dept-btn flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-white/5 cursor-pointer">
        <span class="text-emerald-400">📅</span>
        <span class="font-medium">План учёбы</span>
      </div>
      <div onclick="switchDepartment(this)" class="dept-btn flex items-center gap-3 px-4 py-3 rounded-2xl hover:bg-white/5 cursor-pointer">
        <span class="text-cyan-400">🎤</span>
        <span class="font-medium">Голосовой чат</span>
      </div>
    </div>

    <div class="p-4 border-t border-white/10">
      <button onclick="createNewProject()" 
              class="w-full py-3 bg-gradient-to-r from-purple-600 to-violet-600 rounded-2xl font-semibold hover:scale-105 transition">
        + Новый проект
      </button>
    </div>
  </div>

  <!-- MAIN CHAT -->
  <div class="flex-1 flex flex-col">
    <!-- Header -->
    <div class="h-14 border-b border-white/10 flex items-center px-6 justify-between glass">
      <div class="flex items-center gap-3">
        <div id="current-dept" class="px-4 py-1.5 bg-white/5 rounded-full text-sm font-medium">Общий чат</div>
      </div>
      <div class="text-xs text-zinc-500">Spyris v2.5 • Gemini</div>
    </div>

    <!-- Messages -->
    <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-6">
      <!-- JS will add messages here -->
    </div>

    <!-- Input -->
    <div class="p-6 border-t border-white/10 glass">
      <div class="flex gap-3">
        <input id="message-input" 
               type="text" 
               placeholder="Напиши сообщение Spyris..." 
               class="flex-1 bg-zinc-900 border border-white/10 rounded-3xl px-6 py-4 focus:outline-none focus:border-purple-500 transition"
               onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()" 
                class="bg-purple-600 hover:bg-purple-700 px-8 rounded-3xl font-semibold transition">
          Отправить
        </button>
      </div>
      <p class="text-center text-[10px] text-zinc-500 mt-3">Можешь прикрепить фото для конспекта</p>
    </div>
  </div>

  <!-- RIGHT PANEL (Demo components) -->
  <div class="w-80 border-l border-white/10 bg-zinc-950 p-6 overflow-y-auto hidden lg:block">
    <h3 class="font-medium mb-4 text-purple-400">Демо сегодня</h3>
    
    <!-- Flashcard Demo -->
    <div onclick="flipCard(this)" id="demo-card"
         class="card bg-zinc-900 border border-purple-500/30 rounded-3xl p-8 text-center cursor-pointer h-64 flex items-center justify-center relative preserve-3d">
      <div class="front absolute inset-0 flex items-center justify-center text-xl font-medium">
        Что такое квадратное уравнение?
      </div>
      <div class="back absolute inset-0 flex items-center justify-center text-emerald-400 text-lg rotate-y-180">
        ax² + bx + c = 0
      </div>
    </div>

    <button onclick="showQuiz()" 
            class="mt-8 w-full py-4 bg-white/5 hover:bg-white/10 border border-white/10 rounded-3xl font-medium transition">
      Показать демо-тест
    </button>
  </div>
</div>

<script>
  // Tailwind script
  tailwind.config = { content: ["*"], theme: { extend: {} } }

  // Simple chat
  function addMessage(text, isUser) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
    div.innerHTML = `
      <div class="message-bubble ${isUser ? 'bg-purple-600 text-white' : 'bg-zinc-800 text-white'}">
        ${text}
      </div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function sendMessage() {
    const input = document.getElementById('message-input');
    if (!input.value.trim()) return;
    
    addMessage(input.value, true);
    input.value = '';

    // Fake reply
    setTimeout(() => {
      const replies = [
        "Отлично! Создаю конспект...",
        "Вот 8 флеш-карточек по этой теме",
        "Хочешь тест на 10 вопросов?",
        "Готово! План подготовки на неделю"
      ];
      addMessage(replies[Math.floor(Math.random()*replies.length)], false);
    }, 800);
  }

  // Department switch
  function switchDepartment(el) {
    document.querySelectorAll('.dept-btn').forEach(b => b.classList.remove('active', 'bg-purple-500/10'));
    el.classList.add('active', 'bg-purple-500/10');
    document.getElementById('current-dept').textContent = el.textContent.trim();
  }

  // Card flip
  function flipCard(card) {
    card.classList.toggle('flipped');
  }

  function showQuiz() {
    alert("🎉 Демо-тест запущен!\n\n1. Что такое дискриминант?\nA) b²-4ac   B) a+b+c\n\n(В реальном приложении здесь будет полноценный QuizViewer)");
  }

  function createNewProject() {
    const name = prompt("Название нового проекта:");
    if (name) {
      addMessage(`Создан проект: <strong>${name}</strong>`, false);
    }
  }

  // Welcome message
  window.onload = () => {
    setTimeout(() => {
      addMessage("Привет! Я Spyris — твой AI-учебный помощник. Чем займёмся сегодня?", false);
    }, 600);
  }
</script>

</body>
</html>
